<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  </head>
  <body>
    <h2>OOS Test</h2>
    <button id="run">Run</button>
    <p id="message"></p>

    <script>
      console.log("TEST PAGE LOADED - no bundler, no polyfills");

      Office.onReady(function (info) {
        console.log("Office.onReady fired, host:", info.host);
        document.getElementById("run").onclick = run;
      });

      function run() {
        console.log("Run clicked");
        Word.run(function (context) {
          console.log("Inside Word.run");
          var body = context.document.body;
          context.load(body, "text");

          return context
            .sync()
            .then(function () {
              console.log("CHECKPOINT 1 PASSED, body text length:", body.text.length);
              body.insertText(" Hello World!", "End");
              return context.sync();
            })
            .then(function () {
              console.log("CHECKPOINT 2 PASSED - insert worked");
              document.getElementById("message").textContent = "Success!";
              document.getElementById("message").style.color = "green";
            });
        }).catch(function (error) {
          console.error("FAILED code:", error.code);
          console.error("FAILED message:", error.message);
          console.error("FAILED debugInfo:", JSON.stringify(error.debugInfo, null, 2));
          document.getElementById("message").textContent = "Error: " + error.message;
          document.getElementById("message").style.color = "red";
        });
      }
    </script>
  </body>
</html>
